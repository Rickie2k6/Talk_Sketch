<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excalidraw Whiteboard</title>
  </head>
  <body>
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          margin: 0;
          background: #eef1f7;
          color: #1f2a44;
          font-family: Inter, system-ui, sans-serif;
        "
      >
        <div
          style="
            max-width: 720px;
            background: white;
            border: 1px solid #d7def0;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(27, 39, 94, 0.08);
          "
        >
          <h1 style="margin: 0 0 12px; font-size: 24px">Talk Sketch is loading...</h1>
          <p style="margin: 0 0 12px; line-height: 1.6">
            If this message stays on screen, the browser is blocking the app JavaScript before React can
            start.
          </p>
          <p style="margin: 0; line-height: 1.6">
            Open the browser console to see the exact error. Common causes are Content Security Policy,
            browser extensions, or opening the wrong host/port.
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
