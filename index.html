<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TalkSketch — Sketch & Talk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@excalidraw/excalidraw@0.18.0/dist/prod/index.css">
  <style>
    :root {
      --ink: #1a1f2b;
      --muted: #5f6470;
      --panel: #f4f6fb;
      --line: #e4e7f0;
      --accent: #2f5bff;
      --bg: #f7f8fb;
      --shadow: 0 16px 40px rgba(18, 24, 38, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 15% 10%, #f4f7ff 0%, transparent 55%),
        radial-gradient(circle at 85% 0%, #f7f4ff 0%, transparent 55%),
        var(--bg);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 20px 28px 28px;
      gap: 16px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr 120px;
      align-items: center;
      gap: 12px;
    }

    .toolbar {
      background: white;
      border-radius: 16px;
      border: 1px solid var(--line);
      padding: 10px 16px;
      display: flex;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 24px rgba(18, 24, 38, 0.08);
    }

    .tool {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 10px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 600;
      color: #55607a;
      background: #f5f7fb;
    }

    .tool.active {
      border-color: #c9d4ff;
      background: #eef2ff;
      color: #2447d3;
    }

    .tool-icon {
      width: 20px;
      height: 20px;
      display: block;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
      align-items: stretch;
      min-height: 520px;
    }

    .canvas-wrap {
      background: white;
      border-radius: 26px;
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .canvas-top {
      position: absolute;
      top: 18px;
      left: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: 13px;
      color: var(--muted);
    }

    .canvas-chip {
      background: #f0f3ff;
      border: 1px solid #cfd9ff;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 600;
      color: #2447d3;
    }

    .sketch {
      width: 100%;
      height: 100%;
      padding: 72px 24px 24px;
    }

    .whiteboard-host {
      width: 100%;
      height: 100%;
      min-height: 420px;
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      border: 1px solid #edf0f7;
    }

    .side-panel {
      background: var(--panel);
      border-radius: 26px;
      border: 1px solid var(--line);
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      box-shadow: var(--shadow);
    }

    .assistant-head {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .assistant-head .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #d9e2ff;
      color: var(--accent);
    }

    .panel-scroll {
      overflow: auto;
      padding-right: 6px;
      font-size: 14px;
      color: #484255;
      line-height: 1.55;
    }

    .panel-scroll h4 {
      margin: 14px 0 6px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7a8299;
    }

    .panel-scroll ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .panel-scroll li {
      margin-bottom: 8px;
    }

    .panel-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid #d1d9f2;
      padding: 6px 12px;
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      color: #2945c6;
    }

    .footer {
      display: grid;
      grid-template-columns: 160px 1fr 160px;
      gap: 16px;
      align-items: center;
    }

    .recording {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      background: white;
      font-weight: 600;
      color: var(--muted);
      width: fit-content;
    }

    .record-icon {
      width: 18px;
      height: 18px;
      color: #ff5a6a;
      display: block;
    }

    .transcript {
      text-align: center;
      font-size: clamp(18px, 2.4vw, 32px);
      font-weight: 600;
      color: #111018;
    }

    .input-wrap {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      min-width: 260px;
    }

    .chat-icon {
      width: 18px;
      height: 18px;
      color: #2f5bff;
      display: block;
    }

    .input-wrap input {
      border: none;
      outline: none;
      font: inherit;
      color: var(--muted);
      width: 100%;
    }

    .send-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(140deg, var(--accent), #4b74ff);
      color: white;
      display: grid;
      place-items: center;
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .side-panel {
        order: 2;
      }

      .footer {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .input-wrap {
        justify-self: center;
      }

      .recording {
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="toolbar">
        <button class="tool active" id="drawBtn" type="button" title="Draw">
          <img class="tool-icon" src="tools/draw.svg" alt="Draw">
        </button>
        <button class="tool" id="eraseBtn" type="button" title="Erase">
          <img class="tool-icon" src="tools/erase.svg" alt="Erase">
        </button>
        <button class="tool" id="undoBtn" type="button" title="Undo">
          <img class="tool-icon" src="tools/undo.svg" alt="Undo">
        </button>
        <button class="tool" id="redoBtn" type="button" title="Redo">
          <img class="tool-icon" src="tools/redo.svg" alt="Redo">
        </button>
        <button class="tool" id="clearBtn" type="button" title="Clear">
          <img class="tool-icon" src="tools/clear.svg" alt="Clear">
        </button>
        <button class="tool" id="saveBtn" type="button" title="Save">
          <img class="tool-icon" src="tools/save.svg" alt="Save">
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="canvas-wrap">
        <div class="canvas-top">
          <div>AI-Enhanced Sketch & Talk</div>
        </div>
        <div class="sketch">
          <div id="whiteboard" class="whiteboard-host"></div>
        </div>
      </section>

      <aside class="side-panel">
        <div class="assistant-head">
          <div class="badge">AI Coach</div>
          TalkSketch Chat
        </div>
        <div class="panel-scroll" id="chatMessages" aria-live="polite"></div>
        <div class="panel-actions" style="width:100%;">
          <input
            type="password"
            id="apiKeyInput"
            placeholder="Enter your OpenAI API key"
            style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc;"
          />
          <button
            id="saveKeyBtn"
            style="margin-top:6px; width:100%; padding:8px; border-radius:8px; background:#2f5bff; color:white; border:none;">
            Save API Key
          </button>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <button class="recording" id="recordBtn" type="button" aria-pressed="false">
        <img class="record-icon" src="recording_button/record.svg" alt="">
        <span id="recordLabel">Recording</span>
      </button>
      <div class="input-wrap">
        <img class="chat-icon" src="ai_chatbox/chat.svg" alt="Chat">
        <input id="chatInput" type="text" placeholder="Ask or describe the next sketch..." />
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </footer>
  </div>
  <script type="module" src="whiteboard/whiteboard.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
